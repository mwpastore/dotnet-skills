scenarios:
  - name: "University course catalog with enrollment form"
    prompt: |
      Create a Blazor Web App for a university course catalog.

      Requirements:
      - Browse departments and courses in a searchable, filterable list
      - View course detail pages (description, schedule, credits, instructor bio)
      - Students submit an enrollment request form (name, student ID, course selection) — standard HTML form, no wizards or real-time validation
      - Homepage shows featured courses and department links
      - No authentication — open to all students and visitors
      - Hosted on the university intranet with fast, reliable connectivity
    assertions:
      - type: "output_contains"
        value: "dotnet new blazor"
      - type: "output_matches"
        pattern: "-int(eractivity)? None"
      - type: "output_not_contains"
        value: "blazorwasm"
      - type: "output_not_contains"
        value: "blazorserver"
      - type: "file_exists"
        path: "**/AGENTS.md"
    rubric:
      - "Correct template and configuration — single-project structure (no .Client project), Program.cs calls AddRazorComponents() without any AddInteractive* chains, App.razor does NOT set @rendermode on Routes or HeadOutlet"
      - "Recognizes that Static SSR uses standard HTML POST forms and enhanced navigation — no interactivity needed"
      - "AGENTS.md is created in the project root and documents Static SSR with no interactive render mode and that no AddInteractive* calls should be added"
      - "Implements the requested features — creates pages for browsing courses, viewing course details, and submitting an enrollment form rather than leaving default template pages (Counter, Weather)"
    timeout: 600

  - name: "Veterinary clinic management with staff login"
    prompt: |
      Create a Blazor Web App for managing a veterinary clinic.

      Requirements:
      - Patient records: register pets, view / edit medical history, add treatment notes
      - Appointment scheduling: create, reschedule, cancel — the calendar shows real-time availability
      - Billing: generate invoices, process payments, view payment history
      - All staff access the app from clinic workstations on the local network
      - Every page involves data entry and real-time UI interactions — there are no read-only pages
      - Staff must log in with individual accounts before accessing any page
    assertions:
      - type: "output_contains"
        value: "dotnet new blazor"
      - type: "output_matches"
        pattern: "-int(eractivity)? Server"
      - type: "output_matches"
        pattern: "(-ai|--all-interactive)"
      - type: "output_not_contains"
        value: "blazorwasm"
      - type: "output_not_contains"
        value: "blazorserver"
      - type: "output_matches"
        pattern: "(-au|--auth) Individual"
      - type: "file_exists"
        path: "**/AGENTS.md"
    rubric:
      - "Correct template and configuration — single-project structure (no .Client project), Program.cs registers AddInteractiveServerComponents() and maps AddInteractiveServerRenderMode(), App.razor sets @rendermode InteractiveServer on Routes and HeadOutlet for global interactivity"
      - "Recognizes that Server mode gives full .NET access (EF Core, direct DB) without needing an API layer"
      - "AGENTS.md is created in the project root and documents global Server interactivity, full .NET access, and auth configuration"
      - "Implements the requested features — creates pages for patient records, appointment scheduling, and billing rather than leaving default template pages (Counter, Weather)"
    timeout: 1200

  - name: "Building inspection app for field technicians"
    prompt: |
      Create a Blazor Web App for building inspectors on construction sites.

      Requirements:
      - Inspectors fill out safety checklists and add notes at each site visit
      - Photos are attached to inspection reports
      - Construction sites frequently have poor or no cellular connectivity — the app must continue working offline
      - When connectivity returns, data syncs back to the server
      - Inspectors use phones and tablets, not desktops
      - Low-latency UI is critical — inspectors tap through checklist items quickly
      - No authentication needed in the initial version
    assertions:
      - type: "output_contains"
        value: "dotnet new blazor"
      - type: "output_matches"
        pattern: "-int(eractivity)? WebAssembly"
      - type: "output_not_contains"
        value: "blazorwasm"
      - type: "output_not_contains"
        value: "blazorserver"
      - type: "file_exists"
        path: "**/AGENTS.md"
      - type: "file_exists"
        path: "**.Client/**/*.razor"
    rubric:
      - "Correct template and configuration — two-project structure with .Client project, Server Program.cs registers AddInteractiveWebAssemblyComponents() and maps AddInteractiveWebAssemblyRenderMode()"
      - "Interactive components live in the .Client project and data access requires HTTP APIs — no direct database access from WebAssembly code"
      - "AGENTS.md is created in the project root and documents the two-project structure, .Client project requirement, HTTP APIs for data access, and mentions PWA or offline capability"
      - "Implements the requested features — creates pages for inspection checklists and reports rather than leaving default template pages (Counter, Weather)"
    timeout: 1200

  - name: "Recipe community with interactive ratings on static pages"
    prompt: |
      Create a new Blazor Web App project for a recipe sharing community.

      Requirements:
      - Browse recipes by category — read-only content pages
      - Each recipe page has a star-rating widget (click to rate 1–5 stars)
      - A "Submit Recipe" page with a form (title, ingredients, steps)
      - Homepage displays recipe categories (static content)
      - Most pages are read-only; only the rating widget and submit form need interactivity
    assertions:
      - type: "output_contains"
        value: "dotnet new blazor"
      - type: "output_matches"
        pattern: "-int(eractivity)? Server"
      - type: "output_not_matches"
        pattern: "dotnet new blazor[^\\n]*-ai"
      - type: "output_not_contains"
        value: "blazorwasm"
      - type: "output_not_contains"
        value: "blazorserver"
      - type: "file_exists"
        path: "**/AGENTS.md"
    rubric:
      - "Correct template and configuration — Program.cs registers AddInteractiveServerComponents() and AddInteractiveServerRenderMode(), App.razor does NOT set @rendermode on Routes so interactivity is per-page opt-in"
      - "Static pages (browse, homepage, recipe content) remain SSR for performance while interactive components (rating widget, comments) opt in with @rendermode InteractiveServer"
      - "AGENTS.md is created in the project root and documents per-page Server interactivity — pages are static by default, only interactive components opt in to @rendermode InteractiveServer"
      - "Implements the requested features — creates recipe browsing pages, a recipe detail page with rating widget, and a submit recipe form rather than leaving default template pages (Counter, Weather)"
    timeout: 600

  - name: "Global logistics tracking for worldwide users"
    prompt: |
      Create a Blazor Web App for a logistics company that tracks shipments.

      Requirements:
      - Dispatchers view a list of shipments with status and destination
      - Customers check their shipment status and estimated delivery
      - Users are worldwide — round-trip latency to a single server is noticeable
      - The app must load fast on first visit, then feel snappy without server round-trips
      - Every page involves interactive controls
      - Staff and customers authenticate with individual accounts
    assertions:
      - type: "output_contains"
        value: "dotnet new blazor"
      - type: "output_matches"
        pattern: "-int(eractivity)? Auto"
      - type: "output_matches"
        pattern: "(-ai|--all-interactive)"
      - type: "output_not_contains"
        value: "blazorwasm"
      - type: "output_not_contains"
        value: "blazorserver"
      - type: "output_matches"
        pattern: "(-au|--auth) Individual"
      - type: "file_exists"
        path: "**/AGENTS.md"
      - type: "file_exists"
        path: "**.Client/**/*.razor"
    rubric:
      - "Correct template and configuration — two-project structure with .Client project, Server Program.cs registers both AddInteractiveServerComponents() and AddInteractiveWebAssemblyComponents(), interactive components live in .Client"
      - "Components cannot directly access server resources — all data through HTTP APIs, both server and client Program.cs register matching services, component code must not assume execution environment"
      - "AGENTS.md is created in the project root and documents Auto mode's dual execution environment, .Client project requirement, matching DI registrations, and environment-agnostic coding constraints"
      - "Implements the requested features — creates pages for shipment tracking and customer status views rather than leaving default template pages (Counter, Weather)"
    timeout: 1200
